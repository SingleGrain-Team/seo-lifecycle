function emptyComponents() {

function activeStorageKey() {

function load() {
  try {
    const seededAt = (typeof window !== "undefined" && window.__SEEDED_AT__) || null;

    const storedSeededAt = localStorage.getItem(activeStorageKey() + ":seededAt");

  if (!data.milestones) data.milestones = [];
  if (!data.teammates) data.teammates = DEFAULT_DATA.teammates;
  if (!data.title) data.title = DEFAULT_DATA.title;

  return data;

}

function uid(prefix = "id") {
  return prefix + "-" + Math.random().toString(36).slice(2, 9);
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getMilestone(id) {
  return DATA.milestones.find(m => m.id === id);
}

function renderAll() {
  document.querySelector('[data-bind="title"]').textContent = DATA.title;
  document.querySelector('[data-bind="subtitle"]').textContent = DATA.subtitle;
  renderTimeline();
  renderDetail();
}

function renderTimeline() {
  const inner = document.getElementById("timeline-inner");
  inner.innerHTML = "";
  DATA.milestones.forEach((m, idx) => {
    if (idx > 0) {
      const conn = document.createElement("div");
      conn.className = "connector";
      inner.appendChild(conn);
    }
    const card = document.createElement("div");
    card.className = "milestone-card flex-shrink-0 rounded-2xl bg-white shadow-sm" + (m.id === activeMilestoneId ? " active" : "");
    card.style.width = "220px";
    card.onclick = () => { activeMilestoneId = m.id; renderAll(); scrollDetailIntoView(); };
    card.innerHTML = `
      <div style="background: ${m.color}; height: 8px; border-radius: 16px 16px 0 0;"></div>
      <div class="p-4">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs font-bold" style="color: ${m.color};">STAGE ${idx + 1}</span>
          ${m.duration ? `<span class="duration-pill" style="border: 1px solid ${m.color}33;">${escapeHtml(m.duration)}</span>` : ""}
        </div>
        <div class="font-bold text-base mb-1 leading-tight">${escapeHtml(m.name)}</div>
        <div class="text-xs text-slate-500 leading-snug">${escapeHtml(m.description)}</div>
      </div>
    `;
    inner.appendChild(card);
  });

  // Connector before "add stage" tile
  if (DATA.milestones.length > 0) {
    const conn = document.createElement("div");
    conn.className = "connector";
    inner.appendChild(conn);
  }

  // Add stage tile
  const addTile = document.createElement("div");
  addTile.className = "flex-shrink-0 rounded-2xl border-2 border-dashed border-slate-300 hover:border-slate-500 hover:bg-white cursor-pointer flex items-center justify-center text-slate-500 hover:text-slate-700 transition";
  addTile.style.width = "160px";
  addTile.innerHTML = `<div class="text-center px-4"><div class="text-2xl mb-1">+</div><div class="text-sm font-medium">Add stage</div></div>`;
  addTile.onclick = addStage;
  inner.appendChild(addTile);
}

function scrollDetailIntoView() {
  setTimeout(() => {
    document.getElementById("detail").scrollIntoView({ behavior: "smooth", block: "start" });
  }, 50);
}

function renderDetail() {
  const wrap = document.getElementById("detail");
  const m = getMilestone(activeMilestoneId);
  if (!m) {
    wrap.innerHTML = `<div class="text-slate-500 text-center py-12">Pick a stage above to start editing.</div>`;
    return;
  }
  const idx = DATA.milestones.findIndex(x => x.id === m.id);

  wrap.innerHTML = `
    <div class="fade-in">
      <div class="rounded-2xl overflow-hidden bg-white shadow-sm">
        <div style="background: linear-gradient(135deg, ${m.color}, ${m.color}cc); padding: 28px 32px;">
          <div class="flex items-start justify-between gap-4 flex-wrap">
            <div class="flex-1 min-w-0">
              <div class="text-xs font-bold uppercase tracking-wider text-white/80 mb-1">Stage ${idx + 1} of ${DATA.milestones.length}</div>
              <h2 contenteditable="true" data-edit-name="${m.id}" class="editable text-3xl font-bold text-white leading-tight mb-2">${escapeHtml(m.name)}</h2>
              <p contenteditable="true" data-edit-desc="${m.id}" class="editable text-white/90 text-base leading-snug max-w-3xl">${escapeHtml(m.description)}</p>
            </div>
            <div class="flex flex-col gap-2 items-end">
              <div class="flex items-center gap-2 bg-white/20 rounded-lg px-3 py-2">
                <label class="text-xs text-white/90 font-medium">Color</label>
                <input type="color" value="${m.color}" oninput="updateMilestoneColor('${m.id}', this.value)" class="w-7 h-7 rounded cursor-pointer border-0" style="background: transparent;" />
              </div>
              <div class="flex items-center gap-2 bg-white/20 rounded-lg px-3 py-2">
                <label class="text-xs text-white/90 font-medium">Duration</label>
                <input type="text" value="${escapeHtml(m.duration)}" placeholder="e.g. 30 min, 1 week"
                  oninput="updateDuration('${m.id}', this.value)"
                  class="bg-white/90 rounded px-2 py-1 text-sm w-32 text-slate-900 placeholder-slate-400" />
              </div>
            </div>
          </div>
        </div>

        <div class="p-6">
          <div class="mb-6">
            <div class="section-label">What happens</div>
            <div contenteditable="plaintext-only" data-edit-narrative="${m.id}"
                 data-placeholder="Describe what actually happens in this phase…"
                 class="prose-block">${escapeHtml(m.narrative)}</div>
          </div>

          <div class="positioning-callout mb-6" style="border-left: 4px solid ${m.color};">
            <div class="section-label" style="color: ${m.color};">Positioning note</div>
            <div contenteditable="plaintext-only" data-edit-positioning="${m.id}"
                 data-placeholder="The strategic framing for this phase — why it exists, what it's really for, the sequencing risk to watch…"
                 class="prose-block">${escapeHtml(m.positioning)}</div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            ${COMPONENTS.map(c => renderComponentCard(m, c)).join("")}
          </div>

          <div class="mt-8 pt-6 border-t border-slate-100">
            ${renderComments(m)}
          </div>

          <div class="mt-6 pt-4 flex justify-between items-center flex-wrap gap-3">
            <div class="flex gap-2">
              <button class="btn btn-secondary" onclick="moveStage('${m.id}', -1)" ${idx === 0 ? "disabled" : ""} style="${idx === 0 ? 'opacity:0.5;cursor:not-allowed;' : ''}">← Move earlier</button>
              <button class="btn btn-secondary" onclick="moveStage('${m.id}', 1)" ${idx === DATA.milestones.length - 1 ? "disabled" : ""} style="${idx === DATA.milestones.length - 1 ? 'opacity:0.5;cursor:not-allowed;' : ''}">Move later →</button>
            </div>
            <button class="btn btn-danger" onclick="deleteStage('${m.id}')">Delete this stage</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderComponentCard(m, comp) {
  const items = m.components[comp.key] || [];
  const toneClass = comp.tone ? `tone-${comp.tone}` : "";
  return `
    <div class="component-card ${toneClass}">
      <div class="flex items-center gap-2 mb-3">
        <div style="width: 8px; height: 8px; border-radius: 999px; background: ${m.color};"></div>
        <h3 class="font-semibold text-sm uppercase tracking-wide text-slate-700">${comp.label}</h3>
        <span class="ml-auto text-xs text-slate-400">${items.length}</span>
      </div>
      <div data-comp-list="${m.id}::${comp.key}">
        ${items.map((item, i) => `
          <div class="item-row">
            <div contenteditable="true" data-edit-item="${m.id}::${comp.key}::${i}" class="item-text">${escapeHtml(item)}</div>
            <span class="remove-btn" onclick="removeItem('${m.id}', '${comp.key}', ${i})" title="Remove">×</span>
          </div>
        `).join("")}
      </div>
      <input type="text" class="add-input mt-2" placeholder="${comp.placeholder}"
        onkeydown="if (event.key === 'Enter') { event.preventDefault(); const v = this.value; this.value = ''; addItem('${m.id}', '${comp.key}', v); }"
        onblur="{ const v = this.value; this.value = ''; if (v.trim()) addItem('${m.id}', '${comp.key}', v); }" />
    </div>
  `;
}

function renderComments(m) {
  const teammateOptions = DATA.teammates.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");
  const commentsList = m.comments.length === 0
    ? `<p class="text-sm text-slate-400 italic">No comments yet.</p>`
    : m.comments.map(c => `
        <div class="comment-card">
          <div class="flex items-start justify-between gap-2 mb-1">
            <div>
              <span class="font-semibold text-sm">${escapeHtml(c.author)}</span>
              <span class="text-xs text-slate-400 ml-2">${escapeHtml(formatTimestamp(c.timestamp))}</span>
            </div>
            <span class="remove-btn" onclick="deleteComment('${m.id}', '${c.id}')" title="Delete comment">×</span>
          </div>
          <div class="text-sm text-slate-700 whitespace-pre-wrap">${escapeHtml(c.text)}</div>
        </div>
      `).join("");

  return `
    <h3 class="font-semibold text-base mb-3 flex items-center gap-2">
      Comments
      <span class="text-xs text-slate-400 font-normal">${m.comments.length}</span>
    </h3>
    <div id="comments-list-${m.id}">${commentsList}</div>
    <div class="mt-4 flex flex-col gap-2 bg-slate-50 p-3 rounded-lg">
      <div class="flex gap-2">
        <select id="comment-author-${m.id}" class="px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white"
          onchange="handleTeammateSelect('${m.id}', this)">
          <option value="">Choose teammate…</option>
          ${teammateOptions}
          <option value="__add_new__">+ Add new teammate…</option>
        </select>
      </div>
      <textarea id="comment-text-${m.id}" class="px-3 py-2 border border-slate-200 rounded-lg text-sm" rows="2" placeholder="Add a comment…"></textarea>
      <div class="flex justify-end">
        <button class="btn btn-primary" onclick="addComment('${m.id}')">Post comment</button>
      </div>
    </div>
  `;
}

function formatTimestamp(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  const time = d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  if (sameDay) return `Today, ${time}`;
  return d.toLocaleDateString([], { month: "short", day: "numeric" }) + ", " + time;
}

// --- Mutations ---

function addItem(milestoneId, compKey, raw) {
  const value = String(raw || "").trim();
  if (!value) return;
  const m = getMilestone(milestoneId);
  if (!m) return;
  m.components[compKey].push(value);
  save();
  renderDetail();
}

function removeItem(milestoneId, compKey, index) {
  const m = getMilestone(milestoneId);
  if (!m) return;
  m.components[compKey].splice(index, 1);
  save();
  renderDetail();
}

function updateDuration(milestoneId, value) {
  const m = getMilestone(milestoneId);
  if (!m) return;
  m.duration = value;
  save();
  renderTimeline();
}

function updateMilestoneColor(milestoneId, color) {
  const m = getMilestone(milestoneId);
  if (!m) return;
  m.color = color;
  save();
  renderAll();
}

function moveStage(milestoneId, dir) {
  const idx = DATA.milestones.findIndex(m => m.id === milestoneId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= DATA.milestones.length) return;
  const [m] = DATA.milestones.splice(idx, 1);
  DATA.milestones.splice(newIdx, 0, m);
  save();
  renderAll();
}

function deleteStage(milestoneId) {
  const m = getMilestone(milestoneId);
  if (!m) return;
  if (!confirm(`Delete "${m.name}"? This cannot be undone (but you can re-import a backup JSON).`)) return;
  DATA.milestones = DATA.milestones.filter(x => x.id !== milestoneId);
  activeMilestoneId = DATA.milestones[0]?.id || null;
  save();
  renderAll();
}

function addStage() {
  const newIdx = DATA.milestones.length;
  const color = COLOR_PALETTE[newIdx % COLOR_PALETTE.length];
  const m = {
    id: uid("stage"),
    name: "New stage",
    description: "Click to describe this stage.",
    color,
    duration: "",
    narrative: "",
    positioning: "",
    components: emptyComponents(),
    comments: [],
  };
  DATA.milestones.push(m);
  activeMilestoneId = m.id;
  save();
  renderAll();
  scrollDetailIntoView();
}

function handleTeammateSelect(milestoneId, sel) {
  if (sel.value !== "__add_new__") return;
  const parent = sel.parentElement;
  parent.innerHTML = `
    <input id="new-teammate-input-${milestoneId}" type="text" placeholder="Teammate name"
      class="px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white flex-1" />
    <button class="btn btn-primary" onclick="confirmNewTeammate('${milestoneId}')">Add</button>
    <button class="btn btn-secondary" onclick="cancelNewTeammate('${milestoneId}')">Cancel</button>
  `;
  const input = document.getElementById(`new-teammate-input-${milestoneId}`);
  input.focus();
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); confirmNewTeammate(milestoneId); }
    else if (e.key === "Escape") { cancelNewTeammate(milestoneId); }
  });
}

function confirmNewTeammate(milestoneId) {
  const input = document.getElementById(`new-teammate-input-${milestoneId}`);
  if (!input) return;
  const name = input.value.trim();
  if (!name) { cancelNewTeammate(milestoneId); return; }
  if (!DATA.teammates.includes(name)) {
    DATA.teammates.push(name);
    save();
  }
  renderDetail();
  const newSel = document.getElementById(`comment-author-${milestoneId}`);
  if (newSel) newSel.value = name;
}

function cancelNewTeammate(milestoneId) {
  renderDetail();
}

function addComment(milestoneId) {
  const author = document.getElementById(`comment-author-${milestoneId}`).value;
  const text = document.getElementById(`comment-text-${milestoneId}`).value.trim();
  if (!author) { alert("Pick a teammate first."); return; }
  if (!text) return;
  const m = getMilestone(milestoneId);
  if (!m) return;
  m.comments.push({
    id: uid("c"),
    author,
    text,
    timestamp: new Date().toISOString(),
  });
  save();
  renderDetail();
}

function deleteComment(milestoneId, commentId) {
  const m = getMilestone(milestoneId);
  if (!m) return;
  m.comments = m.comments.filter(c => c.id !== commentId);
  save();
  renderDetail();
}

// --- Header / contenteditable wiring ---

document.addEventListener("input", (e) => {
  const t = e.target;
  if (!t.dataset) return;
  if (t.dataset.bind === "title") { DATA.title = t.textContent.trim(); save(); }
  else if (t.dataset.bind === "subtitle") { DATA.subtitle = t.textContent.trim(); save(); }
  else if (t.dataset.editName) {
    const m = getMilestone(t.dataset.editName);
    if (m) { m.name = t.textContent.trim() || "Untitled stage"; save(); renderTimeline(); }
  }
  else if (t.dataset.editDesc) {
    const m = getMilestone(t.dataset.editDesc);
    if (m) { m.description = t.textContent.trim(); save(); renderTimeline(); }
  }
  else if (t.dataset.editNarrative) {
    const m = getMilestone(t.dataset.editNarrative);
    if (m) { m.narrative = t.textContent; save(); }
  }
  else if (t.dataset.editPositioning) {
    const m = getMilestone(t.dataset.editPositioning);
    if (m) { m.positioning = t.textContent; save(); }
  }
  else if (t.dataset.editItem) {
    const [milestoneId, compKey, idxStr] = t.dataset.editItem.split("::");
    const idx = parseInt(idxStr, 10);
    const m = getMilestone(milestoneId);
    if (m && m.components[compKey]) {
      m.components[compKey][idx] = t.textContent.trim();
      save();
    }
  }
});

// Prevent Enter from inserting newlines in single-line editable fields
document.addEventListener("keydown", (e) => {
  if (e.key !== "Enter" || e.shiftKey) return;
  const t = e.target;
  if (!t.dataset) return;
  if (t.dataset.bind || t.dataset.editName) {
    e.preventDefault();
    t.blur();
  }
});

// --- JSON modal ---

function openJsonModal() {
  document.getElementById("json-textarea").value = JSON.stringify(DATA, null, 2);
  document.getElementById("json-error").classList.add("hidden");
  document.getElementById("json-modal").classList.remove("hidden");
}

function closeJsonModal() {
  document.getElementById("json-modal").classList.add("hidden");
}

function applyJson() {
  const raw = document.getElementById("json-textarea").value;
  try {
    const parsed = JSON.parse(raw);
    DATA = migrate(parsed);
    activeMilestoneId = DATA.milestones[0]?.id || null;
    save();
    renderAll();
    closeJsonModal();
  } catch (e) {
    const err = document.getElementById("json-error");
    err.textContent = "Invalid JSON: " + e.message;
    err.classList.remove("hidden");
  }
}

function copyJson() {
  const ta = document.getElementById("json-textarea");
  ta.select();
  document.execCommand("copy");
}
